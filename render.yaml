services:
  - type: web
    name: drivefuel-ai
    runtime: python
    region: singapore
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: MODEL_STORAGE_PATH
        value: /tmp/trained_models
      - key: PYTHON_VERSION
        value: "3.12.3"
